<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MMO-Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a15;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #header {
      padding: 6px 16px;
      background: rgba(8, 12, 24, 0.95);
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      border-bottom: 1px solid #1a3a5c;
      flex-shrink: 0;
    }
    #header .status { color: #4ecca3; letter-spacing: 1px; }
    #header .stats { color: #556; letter-spacing: 1px; }
    #game-container {
      flex: 1;
      display: flex;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    #canvas {
      flex: 1;
      display: block;
      cursor: crosshair;
    }
    #sidebar {
      width: 260px;
      background: rgba(8, 12, 24, 0.97);
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1a3050;
      flex-shrink: 0;
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 11px;
      line-height: 1.6;
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-track { background: #0a0a15; }
    #chat-box::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 2px; }
    #chat-box .msg { margin-bottom: 3px; padding: 2px 4px; border-radius: 2px; }
    #chat-box .msg .name { color: #4ecca3; font-weight: bold; }
    #chat-box .msg .text { color: #ccc; }
    #chat-box .msg.system { color: #e94560; font-style: italic; opacity: 0.85; }
    #chat-input-container {
      display: flex;
      border-top: 1px solid #1a3050;
    }
    #chat-input {
      flex: 1;
      background: #080c18;
      border: none;
      color: #eee;
      padding: 8px 10px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      outline: none;
    }
    #chat-input::placeholder { color: #334; }
    #controls {
      padding: 6px 10px;
      font-size: 10px;
      color: #445;
      border-top: 1px solid #1a3050;
      line-height: 1.7;
    }
    /* Minimap */
    #minimap {
      position: absolute;
      bottom: 14px;
      left: 14px;
      width: 150px;
      height: 100px;
      border: 1px solid #2a5a8a;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(4, 8, 16, 0.85);
    }
    #minimap-canvas { display: block; }
    /* Login */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(10,20,40,0.95) 0%, rgba(0,0,0,0.98) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #login-box {
      background: linear-gradient(145deg, #0d1b2e 0%, #162640 100%);
      padding: 44px 48px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #2a4a6a;
      box-shadow: 0 0 60px rgba(78,204,163,0.12), 0 0 120px rgba(78,204,163,0.05);
      min-width: 320px;
    }
    #login-box h2 {
      margin-bottom: 4px;
      color: #4ecca3;
      font-size: 32px;
      letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(78,204,163,0.6), 0 0 60px rgba(78,204,163,0.2);
    }
    .subtitle {
      color: #446;
      font-size: 10px;
      letter-spacing: 3px;
      margin-bottom: 28px;
    }
    #login-box input {
      background: rgba(10,20,40,0.8);
      border: 1px solid #2a5a8a;
      color: #eee;
      padding: 10px 16px;
      font-size: 15px;
      border-radius: 6px;
      outline: none;
      width: 220px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #login-box input:focus {
      border-color: #4ecca3;
      box-shadow: 0 0 12px rgba(78,204,163,0.25);
    }
    #join-btn {
      display: block;
      margin: 20px auto 0;
      background: linear-gradient(135deg, #3abf94, #2a9a73);
      color: #0a1520;
      border: none;
      padding: 11px 36px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      transition: all 0.2s;
    }
    #join-btn:hover {
      background: linear-gradient(135deg, #4ecca3, #3abf94);
      box-shadow: 0 0 24px rgba(78,204,163,0.4);
      transform: translateY(-1px);
    }
    #login-box p {
      margin-top: 18px;
      color: #446;
      font-size: 10px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="header">
    <span class="status" id="status">● CONNECTING</span>
    <span class="stats" id="stats"></span>
  </div>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="minimap">
      <canvas id="minimap-canvas"></canvas>
    </div>
    <div id="sidebar">
      <div id="chat-box"></div>
      <div id="controls">
        WASD · 移动 &nbsp; SPACE · 攻击<br>
        ENTER · 聊天 &nbsp; ESC · 关闭输入
      </div>
      <div id="chat-input-container">
        <input id="chat-input" placeholder="按 Enter 发送..." />
      </div>
    </div>
  </div>

  <div id="login-overlay">
    <div id="login-box">
      <h2>MMO-LITE</h2>
      <div class="subtitle">▸ ONLINE ADVENTURE ◂</div>
      <input id="name-input" placeholder="输入你的名字" maxlength="16" />
      <button id="join-btn">▶ 进入游戏</button>
      <p>WASD 移动 · SPACE 攻击 · ENTER 聊天</p>
    </div>
  </div>

  <script>
    const WS_URL = 'ws://localhost:4000';
    const ATTACK_RANGE = 80;

    // ─── State ────────────────────────────────────────────────
    let ws = null;
    let myId = null;
    let players = {};
    let mapWidth = 3000;
    let mapHeight = 2000;
    let camera = { x: 0, y: 0 };
    let keys = {};
    let connected = false;
    let pingTime = 0;
    let latency = 0;
    let particles = [];
    let damageNumbers = [];
    let screenShake = 0;
    let mapObjects = [];
    let obstacles = [];   // 服务端权威下发的碰撞障碍物
    let lastTime = 0;

    // ─── DOM ─────────────────────────────────────────────────
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const mmCanvas   = document.getElementById('minimap-canvas');
    const mmCtx      = mmCanvas.getContext('2d');
    const mmEl       = document.getElementById('minimap');
    const statusEl   = document.getElementById('status');
    const statsEl    = document.getElementById('stats');
    const chatBox    = document.getElementById('chat-box');
    const chatInput  = document.getElementById('chat-input');
    const loginOverlay = document.getElementById('login-overlay');
    const nameInput  = document.getElementById('name-input');
    const joinBtn    = document.getElementById('join-btn');

    // ─── Resize ──────────────────────────────────────────────
    function resize() {
      canvas.width  = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      mmCanvas.width  = mmEl.clientWidth;
      mmCanvas.height = mmEl.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ─── Seeded random ───────────────────────────────────────
    function srand(seed) {
      const x = Math.sin(seed + 1) * 10000;
      return x - Math.floor(x);
    }

    // ─── Procedural map generation ───────────────────────────
    // 注意:树、石等「实心」物体已改由服务端权威生成并下发(见 obstacles),
    // 客户端这里只生成不参与碰撞的纯装饰物:灌木、花。
    function generateMap() {
      mapObjects = [];
      // Bushes
      for (let i = 0; i < 80; i++) {
        mapObjects.push({
          type: 'bush',
          x: srand(i * 11 + 400) * mapWidth,
          y: srand(i * 11 + 401) * mapHeight,
          size: 8 + srand(i * 11 + 402) * 8,
        });
      }
      // Flowers (tiny)
      for (let i = 0; i < 200; i++) {
        mapObjects.push({
          type: 'flower',
          x: srand(i * 5 + 600) * mapWidth,
          y: srand(i * 5 + 601) * mapHeight,
          color: ['#ff9966','#ffcc66','#ff66aa','#aaaaff','#ffffff'][Math.floor(srand(i * 5 + 602) * 5)],
        });
      }
    }

    // ─── Login ───────────────────────────────────────────────
    joinBtn.onclick = () => {
      const name = nameInput.value.trim() || 'Hero';
      connect(name);
      loginOverlay.style.display = 'none';
    };
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') joinBtn.click();
    });

    // ─── WebSocket ───────────────────────────────────────────
    function connect(name) {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        connected = true;
        statusEl.textContent = '● CONNECTED';
        ws.send(JSON.stringify({ type: 'join', data: { name } }));
        startPing();
      };

      ws.onmessage = e => {
        try { handleMessage(JSON.parse(e.data)); } catch {}
      };

      ws.onclose = () => {
        connected = false;
        statusEl.textContent = '○ DISCONNECTED';
        addSysMsg('与服务器断开连接');
      };

      ws.onerror = () => { statusEl.textContent = '✕ ERROR'; };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 's_join':
          myId = msg.data.self.id;
          mapWidth  = msg.data.mapWidth;
          mapHeight = msg.data.mapHeight;
          players[myId] = msg.data.self;
          for (const p of msg.data.players) players[p.id] = p;
          obstacles = msg.data.obstacles || [];
          addSysMsg(`进入了游戏世界 (${mapWidth}x${mapHeight})`);
          generateMap();
          break;

        case 's_enter':
          players[msg.data.id] = msg.data;
          addSysMsg(`${msg.data.name} 进入了视野`);
          spawnRing(msg.data.x, msg.data.y, '#4ecca3', 12);
          break;

        case 's_leave':
          if (players[msg.data.id]) addSysMsg(`${players[msg.data.id].name} 离开了视野`);
          delete players[msg.data.id];
          break;

        case 's_state':
          for (const p of msg.data.players) {
            if (players[p.id]) {
              Object.assign(players[p.id], { targetX: p.x, targetY: p.y, hp: p.hp, isDead: p.isDead });
            } else {
              players[p.id] = p;
            }
          }
          break;

        case 's_chat':
          addChatMsg(msg.data.from, msg.data.text);
          break;

        case 's_damage': {
          const t = players[msg.data.targetId];
          if (t) {
            t.hitFlash = 10;
            t.hp = msg.data.targetHp;
            const tx = t.targetX ?? t.x, ty = t.targetY ?? t.y;
            spawnHit(tx, ty, msg.data.damage);
            spawnDmgNum(tx, ty, msg.data.damage);
            if (msg.data.targetId === myId) screenShake = 9;
          }
          break;
        }

        case 's_dead':
          if (players[msg.data.id]) {
            players[msg.data.id].isDead = true;
            const p = players[msg.data.id];
            spawnDeath(p.targetX ?? p.x, p.targetY ?? p.y);
          }
          if (msg.data.id === myId) addSysMsg('☠ 你阵亡了！3秒后复活...');
          break;

        case 's_respawn':
          if (players[msg.data.id]) {
            Object.assign(players[msg.data.id], msg.data);
          } else {
            players[msg.data.id] = msg.data;
          }
          spawnRing(msg.data.x, msg.data.y, '#ffe066', 16);
          if (msg.data.id === myId) addSysMsg('✦ 已复活！');
          break;

        case 's_pong':
          latency = Date.now() - (msg.data?.time || pingTime);
          break;

        case 's_error':
          addSysMsg(`错误: ${msg.data.msg}`);
          break;
      }
    }

    function addSysMsg(text) {
      const d = document.createElement('div');
      d.className = 'msg system';
      d.textContent = `[系统] ${text}`;
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addChatMsg(name, text) {
      const d = document.createElement('div');
      d.className = 'msg';
      d.innerHTML = `<span class="name">${esc(name)}:</span> <span class="text">${esc(text)}</span>`;
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── Input ────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (document.activeElement === chatInput) {
        if (e.key === 'Enter') {
          const text = chatInput.value.trim();
          if (text && ws) ws.send(JSON.stringify({ type: 'c_chat', data: { text } }));
          chatInput.value = '';
          chatInput.blur();
        }
        if (e.key === 'Escape') chatInput.blur();
        return;
      }
      if (e.key === 'Enter') { chatInput.focus(); return; }

      keys[e.key.toLowerCase()] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (ws && connected && myId) {
          ws.send(JSON.stringify({ type: 'c_attack' }));
          if (players[myId]) players[myId].attackFlash = 12;
        }
      }
    });

    document.addEventListener('keyup', e => {
      keys[e.key.toLowerCase()] = false;
    });

    function sendInput() {
      if (!ws || !connected || !myId) return;
      if (document.activeElement === chatInput) return;
      let dx = 0, dy = 0;
      if (keys['w'] || keys['arrowup'])    dy -= 1;
      if (keys['s'] || keys['arrowdown'])  dy += 1;
      if (keys['a'] || keys['arrowleft'])  dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;
      if (dx !== 0 || dy !== 0) {
        ws.send(JSON.stringify({ type: 'c_move', data: { dx, dy } }));
        if (players[myId]) players[myId]._moving = true;
      } else if (players[myId]?._moving) {
        ws.send(JSON.stringify({ type: 'c_stop' }));
        players[myId]._moving = false;
      }
    }
    setInterval(sendInput, 50);

    function startPing() {
      setInterval(() => {
        if (ws && connected) {
          pingTime = Date.now();
          ws.send(JSON.stringify({ type: 'c_ping', data: { time: pingTime } }));
        }
      }, 3000);
    }

    // ─── Particles ────────────────────────────────────────────
    function spawnParticles(x, y, n, cfg) {
      for (let i = 0; i < n; i++) {
        const angle = Math.PI * 2 * i / n + (Math.random() - 0.5) * 0.9;
        const spd   = cfg.spdMin + Math.random() * (cfg.spdMax - cfg.spdMin);
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          decay: cfg.decay ?? (0.03 + Math.random() * 0.04),
          size: cfg.szMin + Math.random() * (cfg.szMax - cfg.szMin),
          color: Array.isArray(cfg.color) ? cfg.color[i % cfg.color.length] : cfg.color,
          gravity: cfg.gravity ?? 0,
        });
      }
    }

    function spawnHit(x, y, dmg) {
      spawnParticles(x, y, Math.min(8 + dmg, 16), {
        spdMin: 1.5, spdMax: 4.5, szMin: 2, szMax: 5,
        color: ['#ff4444','#ff8844','#ffcc44','#ffffff'],
        decay: 0.055, gravity: 0.12,
      });
    }

    function spawnDeath(x, y) {
      spawnParticles(x, y, 22, {
        spdMin: 2.5, spdMax: 7, szMin: 3, szMax: 8,
        color: ['#e94560','#ff7070','#ffaa44','#ffffff'],
        decay: 0.022, gravity: 0.04,
      });
    }

    function spawnRing(x, y, color, n) {
      spawnParticles(x, y, n, {
        spdMin: 1.5, spdMax: 3.5, szMin: 2, szMax: 4,
        color, decay: 0.04,
      });
    }

    function spawnDmgNum(x, y, dmg) {
      damageNumbers.push({
        x, y, vy: -1.8, life: 1, decay: 0.022,
        text: `-${dmg}`,
        big: dmg >= 20,
      });
    }

    function updateFX() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += p.gravity; p.vx *= 0.91; p.vy *= 0.91;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = damageNumbers.length - 1; i >= 0; i--) {
        const d = damageNumbers[i];
        d.y += d.vy; d.vy *= 0.94;
        d.life -= d.decay;
        if (d.life <= 0) damageNumbers.splice(i, 1);
      }
    }

    // ─── Color helpers ────────────────────────────────────────
    const PCOLORS = ['#e94560','#4ecca3','#f0a500','#7c6af7','#2be0ff','#ff69b4','#7dff6a','#ff9944'];
    function pcolor(id) { return PCOLORS[id % PCOLORS.length]; }

    function lighten(hex, amt) {
      const n = parseInt(hex.slice(1), 16);
      const r = Math.min(255, (n >> 16) + amt);
      const g = Math.min(255, ((n >> 8) & 0xff) + amt);
      const b = Math.min(255, (n & 0xff) + amt);
      return `rgb(${r},${g},${b})`;
    }

    // ─── Draw map objects ─────────────────────────────────────
    function drawTree(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      const s = o.size;
      // Shadow
      ctx.save(); ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(sx + s * 0.25, sy + s * 0.55, s * 0.75, s * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Trunk
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(sx - s * 0.1, sy - s * 0.05, s * 0.2, s * 0.45);
      // Foliage palette per variant
      const palettes = [
        ['#1a5c1a','#2a7a2a','#1e6e1e','#266626'],
        ['#1a4a3a','#2a6a5a','#206050','#285848'],
        ['#2a3a1a','#3a5a2a','#2e4a1e','#384830'],
      ];
      const pal = palettes[o.variant % 3];
      ctx.fillStyle = pal[0];
      ctx.beginPath(); ctx.arc(sx, sy - s * 0.05, s * 0.88, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = pal[1];
      ctx.beginPath(); ctx.arc(sx - s * 0.2, sy - s * 0.28, s * 0.62, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = pal[2];
      ctx.beginPath(); ctx.arc(sx + s * 0.15, sy - s * 0.38, s * 0.58, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = pal[3];
      ctx.beginPath(); ctx.arc(sx, sy - s * 0.6, s * 0.5, 0, Math.PI * 2); ctx.fill();
      // Highlight
      ctx.save(); ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#aaffaa';
      ctx.beginPath(); ctx.arc(sx - s * 0.15, sy - s * 0.45, s * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawBush(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      const s = o.size;
      ctx.fillStyle = '#245024';
      ctx.beginPath(); ctx.arc(sx, sy, s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#346034';
      ctx.beginPath(); ctx.arc(sx - s * 0.48, sy - s * 0.18, s * 0.72, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx + s * 0.42, sy - s * 0.25, s * 0.65, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#427a42';
      ctx.beginPath(); ctx.arc(sx - s * 0.08, sy - s * 0.55, s * 0.52, 0, Math.PI * 2); ctx.fill();
    }

    function drawFlower(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = o.color;
      ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // 服务端障碍物:按真实碰撞半径绘制的苔石巨砾(玩家会被它挡住/滑过)
    function drawObstacle(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      const r = o.radius;
      ctx.save();
      // 地面阴影
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(sx + r * 0.12, sy + r * 0.42, r * 1.02, r * 0.42, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // 石体(径向渐变模拟受光)
      const g = ctx.createRadialGradient(sx - r * 0.35, sy - r * 0.35, r * 0.2, sx, sy, r);
      g.addColorStop(0, '#6b6f7d');
      g.addColorStop(1, '#3a3d47');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
      // 顶部苔藓
      ctx.fillStyle = 'rgba(78,204,163,0.35)';
      ctx.beginPath(); ctx.arc(sx - r * 0.2, sy - r * 0.35, r * 0.5, 0, Math.PI * 2); ctx.fill();
      // 边缘描边(勾出碰撞轮廓)
      ctx.strokeStyle = 'rgba(20,22,28,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    function isVisible(x, y, pad) {
      const sx = x - camera.x, sy = y - camera.y;
      return sx > -pad && sx < canvas.width + pad && sy > -pad && sy < canvas.height + pad;
    }

    // ─── Draw player ──────────────────────────────────────────
    function drawPlayer(p, id) {
      // Smooth interpolate
      if (p.targetX !== undefined) {
        p.x += (p.targetX - p.x) * 0.28;
        p.y += (p.targetY - p.y) * 0.28;
      }

      const sx = Math.round(p.x - camera.x);
      const sy = Math.round(p.y - camera.y);
      if (!isVisible(p.x, p.y, 80)) return;

      const isMe = parseInt(id) === myId;
      const R = 14;

      if (p.isDead) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#8888aa';
        ctx.beginPath(); ctx.arc(sx, sy, R, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#e94560';
        ctx.font = '16px serif';
        ctx.textAlign = 'center';
        ctx.fillText('☠', sx, sy + 6);
        ctx.restore();
        return;
      }

      if (p.hitFlash && p.hitFlash > 0) p.hitFlash--;

      const baseColor = p.hitFlash > 0 ? '#ff5555' : (isMe ? '#4ecca3' : pcolor(parseInt(id)));

      // Ground shadow
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(sx + 2, sy + R - 1, R * 0.85, R * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Glow for self
      if (isMe) {
        const grd = ctx.createRadialGradient(sx, sy, R, sx, sy, R * 2.8);
        grd.addColorStop(0, 'rgba(78,204,163,0.18)');
        grd.addColorStop(1, 'rgba(78,204,163,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(sx, sy, R * 2.8, 0, Math.PI * 2); ctx.fill();
      }

      // Body gradient
      const grad = ctx.createRadialGradient(sx - 4, sy - 4, 1, sx, sy, R);
      grad.addColorStop(0, lighten(baseColor, 50));
      grad.addColorStop(0.5, baseColor);
      grad.addColorStop(1, lighten(baseColor, -30));
      ctx.beginPath(); ctx.arc(sx, sy, R, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Border
      ctx.strokeStyle = isMe ? '#ffffff' : lighten(baseColor, 30);
      ctx.lineWidth = isMe ? 2 : 1.5;
      ctx.stroke();

      // Inner detail ring
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(sx, sy, R * 0.6, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      // Attack flash ring
      if (p.attackFlash && p.attackFlash > 0) {
        p.attackFlash--;
        const prog = 1 - p.attackFlash / 12;
        ctx.beginPath();
        ctx.arc(sx, sy, R + ATTACK_RANGE * prog, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,220,80,${(1 - prog) * 0.85})`;
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Second inner ring
        ctx.beginPath();
        ctx.arc(sx, sy, R + ATTACK_RANGE * prog * 0.5, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,180,40,${(1 - prog) * 0.4})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Name tag
      const name = p.name || `P${id}`;
      ctx.font = `bold 11px Courier New`;
      ctx.textAlign = 'center';
      const tw = ctx.measureText(name).width;
      const nameY = sy - R - 14;
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#000010';
      ctx.fillRect(sx - tw / 2 - 5, nameY - 11, tw + 10, 14);
      ctx.restore();
      ctx.fillStyle = isMe ? '#4ecca3' : '#e8e8e8';
      ctx.fillText(name, sx, nameY);

      // HP bar
      const bW = 38, bH = 4;
      const bX = sx - bW / 2, bY = sy - R - 7;
      const ratio = Math.max(0, (p.hp || 0) / (p.maxHp || 100));
      const hpColor = ratio > 0.6 ? '#4ecca3' : ratio > 0.3 ? '#f0a500' : '#e94560';

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bX - 1, bY - 1, bW + 2, bH + 2);
      ctx.fillStyle = '#111';
      ctx.fillRect(bX, bY, bW, bH);
      ctx.fillStyle = hpColor;
      ctx.fillRect(bX, bY, bW * ratio, bH);

      if (ratio > 0) {
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.shadowColor = hpColor;
        ctx.shadowBlur = 6;
        ctx.fillStyle = hpColor;
        ctx.fillRect(bX, bY, bW * ratio, bH);
        ctx.restore();
      }
    }

    // ─── Minimap ──────────────────────────────────────────────
    function drawMinimap() {
      const mw = mmCanvas.width, mh = mmCanvas.height;
      mmCtx.clearRect(0, 0, mw, mh);
      mmCtx.fillStyle = 'rgba(4,8,18,0.9)';
      mmCtx.fillRect(0, 0, mw, mh);

      const sx = mw / mapWidth, sy = mh / mapHeight;

      // 障碍物:树=绿点,石=灰点(按视觉尺寸缩放)
      for (const o of obstacles) {
        if (o.type === 'tree') {
          mmCtx.fillStyle = '#1a4a1a';
          mmCtx.fillRect(o.x * sx - 1, o.y * sy - 1, 2.5, 2.5);
        } else {
          mmCtx.fillStyle = '#8b8f9c';
          mmCtx.beginPath();
          mmCtx.arc(o.x * sx, o.y * sy, Math.max(1.5, o.radius * sx), 0, Math.PI * 2);
          mmCtx.fill();
        }
      }

      // Viewport rect
      mmCtx.strokeStyle = 'rgba(255,255,255,0.15)';
      mmCtx.lineWidth = 1;
      mmCtx.strokeRect(camera.x * sx, camera.y * sy, canvas.width * sx, canvas.height * sy);

      // Players
      for (const [id, p] of Object.entries(players)) {
        if (p.isDead) continue;
        const px = (p.targetX ?? p.x) * sx;
        const py = (p.targetY ?? p.y) * sy;
        mmCtx.fillStyle = parseInt(id) === myId ? '#4ecca3' : '#e94560';
        mmCtx.beginPath();
        mmCtx.arc(px, py, parseInt(id) === myId ? 3 : 2, 0, Math.PI * 2);
        mmCtx.fill();
      }

      // Border
      mmCtx.strokeStyle = '#2a5a8a';
      mmCtx.lineWidth = 1;
      mmCtx.strokeRect(0, 0, mw, mh);
    }

    // ─── Render loop ──────────────────────────────────────────
    function render(now) {
      requestAnimationFrame(render);

      resize();
      const W = canvas.width, H = canvas.height;

      // Screen shake
      let shX = 0, shY = 0;
      if (screenShake > 0) {
        shX = (Math.random() - 0.5) * screenShake;
        shY = (Math.random() - 0.5) * screenShake;
        screenShake = Math.max(0, screenShake - 1.2);
      }
      ctx.save();
      ctx.translate(shX, shY);

      // Smooth camera
      const me = players[myId];
      if (me) {
        const tx = (me.targetX ?? me.x) - W / 2;
        const ty = (me.targetY ?? me.y) - H / 2;
        camera.x += (tx - camera.x) * 0.1;
        camera.y += (ty - camera.y) * 0.1;
      }

      // ── Background ─────────────────────────────────────────
      ctx.fillStyle = '#1c3c1c';
      ctx.fillRect(0, 0, W, H);

      // Subtle grass tiles
      ctx.strokeStyle = 'rgba(28,70,28,0.55)';
      ctx.lineWidth = 1;
      const gs = 80;
      const ox = -(camera.x % gs), oy = -(camera.y % gs);
      for (let x = ox; x < W; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = oy; y < H; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Map boundary glow
      const bx = -camera.x, by = -camera.y;
      ctx.save();
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#e94560';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(bx, by, mapWidth, mapHeight);
      ctx.restore();

      // ── Sort objects for Y-depth ────────────────────────────
      const visObj = mapObjects.filter(o => isVisible(o.x, o.y, 120));
      visObj.sort((a, b) => a.y - b.y);

      // 装饰物(客户端本地、无碰撞):花、灌木 —— 地面层
      for (const o of visObj) {
        if (o.type === 'flower') drawFlower(o);
        else if (o.type === 'bush') drawBush(o);
      }

      // 服务端障碍物拆成两层:石在玩家下,树冠在玩家上(可走到树荫下被遮挡)
      const rocks = [], trees = [];
      for (const o of obstacles) {
        if (o.type === 'tree') { if (isVisible(o.x, o.y, o.size + 80)) trees.push(o); }
        else if (isVisible(o.x, o.y, o.radius + 40)) rocks.push(o);
      }
      rocks.sort((a, b) => a.y - b.y);
      trees.sort((a, b) => a.y - b.y);

      // 石(碰撞体,玩家之下)
      for (const o of rocks) drawObstacle(o);

      // ── Players (sorted by Y) ───────────────────────────────
      const sortedP = Object.entries(players).sort(([,a],[,b]) => (a.y||0) - (b.y||0));
      for (const [id, p] of sortedP) drawPlayer(p, id);

      // 树(树干挡人,树冠盖在玩家头顶)
      for (const o of trees) drawTree(o);

      // ── Particles ───────────────────────────────────────────
      updateFX();
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x - camera.x, p.y - camera.y, p.size * p.life + 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // ── Damage numbers ──────────────────────────────────────
      for (const d of damageNumbers) {
        const dx = d.x - camera.x, dy = d.y - camera.y;
        const fs = d.big ? 15 : 12;
        ctx.save();
        ctx.globalAlpha = d.life;
        ctx.font = `bold ${fs}px Courier New`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(0,0,0,0.75)';
        ctx.lineWidth = 3;
        ctx.strokeText(d.text, dx, dy);
        ctx.fillStyle = d.big ? '#ffdd00' : '#ff7766';
        ctx.fillText(d.text, dx, dy);
        ctx.restore();
      }

      // ── Vignette ────────────────────────────────────────────
      const vig = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.85);
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(1, 'rgba(0,0,0,0.48)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      ctx.restore(); // end screen shake

      // ── HUD ─────────────────────────────────────────────────
      statsEl.textContent = `PING: ${latency}ms  ·  PLAYERS: ${Object.keys(players).length}`;

      drawMinimap();
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
