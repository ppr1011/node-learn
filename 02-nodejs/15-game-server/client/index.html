<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MMO-Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a15;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #header {
      padding: 6px 16px;
      background: rgba(8, 12, 24, 0.95);
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      border-bottom: 1px solid #1a3a5c;
      flex-shrink: 0;
    }
    #header .status { color: #4ecca3; letter-spacing: 1px; }
    #header .stats { color: #556; letter-spacing: 1px; }
    #game-container {
      flex: 1;
      display: flex;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    #canvas {
      flex: 1;
      display: block;
      cursor: crosshair;
    }
    #sidebar {
      width: 260px;
      background: rgba(8, 12, 24, 0.97);
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1a3050;
      flex-shrink: 0;
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 11px;
      line-height: 1.6;
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-track { background: #0a0a15; }
    #chat-box::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 2px; }
    #chat-box .msg { margin-bottom: 3px; padding: 2px 4px; border-radius: 2px; }
    #chat-box .msg .name { color: #4ecca3; font-weight: bold; }
    #chat-box .msg .text { color: #ccc; }
    #chat-box .msg.system { color: #e94560; font-style: italic; opacity: 0.85; }
    #chat-input-container {
      display: flex;
      border-top: 1px solid #1a3050;
    }
    #chat-input {
      flex: 1;
      background: #080c18;
      border: none;
      color: #eee;
      padding: 8px 10px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      outline: none;
    }
    #chat-input::placeholder { color: #334; }
    #controls {
      padding: 6px 10px;
      font-size: 10px;
      color: #445;
      border-top: 1px solid #1a3050;
      line-height: 1.7;
    }
    /* Minimap */
    #minimap {
      position: absolute;
      bottom: 14px;
      left: 14px;
      width: 150px;
      height: 100px;
      border: 1px solid #2a5a8a;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(4, 8, 16, 0.85);
    }
    #minimap-canvas { display: block; }
    /* Login */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(10,20,40,0.95) 0%, rgba(0,0,0,0.98) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #login-box {
      background: linear-gradient(145deg, #0d1b2e 0%, #162640 100%);
      padding: 44px 48px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #2a4a6a;
      box-shadow: 0 0 60px rgba(78,204,163,0.12), 0 0 120px rgba(78,204,163,0.05);
      min-width: 320px;
    }
    #login-box h2 {
      margin-bottom: 4px;
      color: #4ecca3;
      font-size: 32px;
      letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(78,204,163,0.6), 0 0 60px rgba(78,204,163,0.2);
    }
    .subtitle {
      color: #446;
      font-size: 10px;
      letter-spacing: 3px;
      margin-bottom: 28px;
    }
    #login-box input {
      background: rgba(10,20,40,0.8);
      border: 1px solid #2a5a8a;
      color: #eee;
      padding: 10px 16px;
      font-size: 15px;
      border-radius: 6px;
      outline: none;
      width: 220px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #login-box input:focus {
      border-color: #4ecca3;
      box-shadow: 0 0 12px rgba(78,204,163,0.25);
    }
    #join-btn {
      display: block;
      margin: 20px auto 0;
      background: linear-gradient(135deg, #3abf94, #2a9a73);
      color: #0a1520;
      border: none;
      padding: 11px 36px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      transition: all 0.2s;
    }
    #join-btn:hover {
      background: linear-gradient(135deg, #4ecca3, #3abf94);
      box-shadow: 0 0 24px rgba(78,204,163,0.4);
      transform: translateY(-1px);
    }
    #login-box p {
      margin-top: 18px;
      color: #446;
      font-size: 10px;
      letter-spacing: 1px;
    }
    #remember-hint {
      display: none;
      margin-top: 16px;
      font-size: 11px;
      color: #4ecca3;
      line-height: 1.7;
    }
    #remember-hint #remember-name { font-weight: bold; color: #ffe066; }
    #remember-hint .rh-sub { color: #557; }
    #remember-hint #reset-char {
      color: #e94560;
      text-decoration: none;
      margin-left: 6px;
      border-bottom: 1px dashed rgba(233,69,96,0.5);
    }
    #remember-hint #reset-char:hover { color: #ff6b81; }
  </style>
</head>
<body>
  <div id="header">
    <span class="status" id="status">● CONNECTING</span>
    <span class="stats" id="stats"></span>
  </div>
  <div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="minimap">
      <canvas id="minimap-canvas"></canvas>
    </div>
    <div id="sidebar">
      <div id="chat-box"></div>
      <div id="controls">
        WASD · 移动 &nbsp; SPACE · 攻击<br>
        ENTER · 聊天 &nbsp; ESC · 关闭输入<br>
        <span style="color:#4ecca3">击杀敌人掉落武器 · 走过即拾取装备</span><br>
        <span style="color:#365">T · 切天气 &nbsp; [ ] · 强度 &nbsp; Y · 复原</span>
      </div>
      <div id="chat-input-container">
        <input id="chat-input" placeholder="按 Enter 发送..." />
      </div>
    </div>
  </div>

  <div id="login-overlay">
    <div id="login-box">
      <h2>MMO-LITE</h2>
      <div class="subtitle">▸ ONLINE ADVENTURE ◂</div>
      <input id="name-input" placeholder="输入你的名字" maxlength="16" />
      <button id="join-btn">▶ 进入游戏</button>
      <div id="remember-hint">
        ⟳ 上次的角色 · <span id="remember-name"></span><br>
        <span class="rh-sub">将恢复上次的位置与装备</span>
        <a id="reset-char" href="#">重置角色</a>
      </div>
      <p>WASD 移动 · SPACE 攻击 · ENTER 聊天</p>
    </div>
  </div>

  <script>
    const WS_URL = 'ws://localhost:4000';
    const ATTACK_RANGE = 80;

    // ─── State ────────────────────────────────────────────────
    let ws = null;
    let myId = null;
    // 角色身份持久化:token 长期保存在 localStorage,作为跨会话的稳定角色标识;
    // name 记住上次角色名。掉线后带 token 重连 → 服务端恢复位置/血量/装备。
    let myToken = localStorage.getItem('mmo_token') || null;
    let currentName = localStorage.getItem('mmo_name') || '';
    let pingInterval = null;
    let reconnectTimer = null;
    let reconnectAttempts = 0;
    let players = {};
    let mapWidth = 3000;
    let mapHeight = 2000;
    let camera = { x: 0, y: 0 };
    let keys = {};
    let connected = false;
    let pingTime = 0;
    let latency = 0;
    let particles = [];
    let damageNumbers = [];
    let screenShake = 0;
    let mapObjects = [];
    let obstacles = [];   // 服务端权威下发的碰撞障碍物
    let enemies = {};     // id → enemy state (from server)
    let drops = {};       // id → 地面武器掉落物 { id, kind, rarity, x, y }
    let projectiles = []; // 飞行物(法球等),世界坐标
    let shockwaves = [];  // 重击落地震波环,世界坐标
    let lastAttackAt = 0; // 本地最近一次成功发起攻击的时间(仅用于冷却环 HUD 估算)
    let frame = 0;        // 渲染帧计数(掉落物浮动/光环脉动用)
    let weather = { kind: 'clear', intensity: 0 }; // 服务端权威下发的全局天气(仅 kind + intensity)
    let lastTime = 0;
    // 天气视觉细节全部在客户端程序化生成(见文件末尾「Weather」章节),
    // 天然随 intensity 缩放,零资源依赖。分层粒子池 fx 亦在那里定义。

    // ─── DOM ─────────────────────────────────────────────────
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const mmCanvas   = document.getElementById('minimap-canvas');
    const mmCtx      = mmCanvas.getContext('2d');
    const mmEl       = document.getElementById('minimap');
    const statusEl   = document.getElementById('status');
    const statsEl    = document.getElementById('stats');
    const chatBox    = document.getElementById('chat-box');
    const chatInput  = document.getElementById('chat-input');
    const loginOverlay = document.getElementById('login-overlay');
    const nameInput  = document.getElementById('name-input');
    const joinBtn    = document.getElementById('join-btn');
    const rememberHint = document.getElementById('remember-hint');
    const rememberName = document.getElementById('remember-name');
    const resetCharBtn = document.getElementById('reset-char');

    // ─── Resize ──────────────────────────────────────────────
    function resize() {
      canvas.width  = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      mmCanvas.width  = mmEl.clientWidth;
      mmCanvas.height = mmEl.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ─── Seeded random ───────────────────────────────────────
    function srand(seed) {
      const x = Math.sin(seed + 1) * 10000;
      return x - Math.floor(x);
    }

    // ─── Procedural map generation ───────────────────────────
    // 注意:树、石等「实心」物体已改由服务端权威生成并下发(见 obstacles),
    // 客户端这里只生成不参与碰撞的纯装饰物:灌木、花。
    function generateMap() {
      mapObjects = [];
      // Bushes
      for (let i = 0; i < 80; i++) {
        mapObjects.push({
          type: 'bush',
          x: srand(i * 11 + 400) * mapWidth,
          y: srand(i * 11 + 401) * mapHeight,
          size: 8 + srand(i * 11 + 402) * 8,
        });
      }
      // Flowers (tiny)
      for (let i = 0; i < 200; i++) {
        mapObjects.push({
          type: 'flower',
          x: srand(i * 5 + 600) * mapWidth,
          y: srand(i * 5 + 601) * mapHeight,
          color: ['#ff9966','#ffcc66','#ff66aa','#aaaaff','#ffffff'][Math.floor(srand(i * 5 + 602) * 5)],
        });
      }
    }

    // ─── Login / 角色注册 ─────────────────────────────────────
    // 本地已记住角色 → 预填名字、展示「继续冒险」;否则视为首次注册
    function initLogin() {
      if (myToken && currentName) {
        nameInput.value = currentName;
        rememberName.textContent = currentName;
        rememberHint.style.display = 'block';
        joinBtn.textContent = '▶ 继续冒险';
      } else {
        rememberHint.style.display = 'none';
        joinBtn.textContent = '▶ 进入游戏';
      }
    }
    initLogin();

    // 重置角色:清掉本地身份,下次进入即注册全新角色(服务端会分配新 token)
    resetCharBtn.onclick = e => {
      e.preventDefault();
      localStorage.removeItem('mmo_token');
      localStorage.removeItem('mmo_name');
      myToken = null;
      currentName = '';
      nameInput.value = '';
      initLogin();
      nameInput.focus();
    };

    joinBtn.onclick = () => {
      const name = nameInput.value.trim() || 'Hero';
      currentName = name;
      localStorage.setItem('mmo_name', name);
      reconnectAttempts = 0;
      connect(name);
      loginOverlay.style.display = 'none';
    };
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') joinBtn.click();
    });

    // ─── WebSocket ───────────────────────────────────────────
    function connect(name) {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        connected = true;
        statusEl.textContent = '● CONNECTED';
        // 带上本地 token:老角色 → 服务端恢复存档;首次注册 token=null,服务端生成后回传
        ws.send(JSON.stringify({ type: 'join', data: { name, token: myToken } }));
        startPing();
      };

      ws.onmessage = e => {
        try { handleMessage(JSON.parse(e.data)); } catch {}
      };

      ws.onclose = () => {
        connected = false;
        statusEl.textContent = '○ DISCONNECTED';
        scheduleReconnect();
      };

      ws.onerror = () => { statusEl.textContent = '✕ ERROR'; };
    }

    // 掉线自动重连:带同一 token 回到共享世界,服务端把角色恢复到掉线前的位置
    function scheduleReconnect() {
      if (reconnectTimer || !currentName) return;
      reconnectAttempts++;
      if (reconnectAttempts > 30) {
        addSysMsg('重连失败,请刷新页面重试');
        statusEl.textContent = '○ OFFLINE';
        return;
      }
      const delay = Math.min(5000, 1000 * reconnectAttempts);
      addSysMsg(`与服务器断开,${(delay / 1000)}s 后尝试重连 (#${reconnectAttempts})...`);
      statusEl.textContent = `↻ RECONNECTING (${reconnectAttempts})`;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect(currentName);
      }, delay);
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 's_join':
          myId = msg.data.self.id;
          // 记住服务端回传的角色 token(首次注册即在此落地本地存储)
          if (msg.data.token) {
            myToken = msg.data.token;
            localStorage.setItem('mmo_token', myToken);
            localStorage.setItem('mmo_name', msg.data.self.name || currentName);
          }
          reconnectAttempts = 0;
          mapWidth  = msg.data.mapWidth;
          mapHeight = msg.data.mapHeight;
          players = {};   // 清空旧快照:重连时避免残留其他玩家的「幽灵」
          players[myId] = msg.data.self;
          for (const p of msg.data.players) players[p.id] = p;
          obstacles = msg.data.obstacles || [];
          if (msg.data.enemies) {
            enemies = {};
            for (const e of msg.data.enemies) enemies[e.id] = e;
          }
          drops = {};
          if (msg.data.drops) for (const d of msg.data.drops) drops[d.id] = d;
          if (msg.data.weather) { weather = msg.data.weather; addSysMsg(`当前天气: ${weatherLabel(weather.kind)}`); }
          addSysMsg(`进入了游戏世界 (${mapWidth}x${mapHeight})`);
          generateMap();
          break;

        case 's_enter':
          players[msg.data.id] = msg.data;
          addSysMsg(`${msg.data.name} 进入了视野`);
          spawnRing(msg.data.x, msg.data.y, '#4ecca3', 12);
          break;

        case 's_leave':
          if (players[msg.data.id]) addSysMsg(`${players[msg.data.id].name} 离开了视野`);
          delete players[msg.data.id];
          break;

        case 's_state':
          for (const p of msg.data.players) {
            if (players[p.id]) {
              Object.assign(players[p.id], { targetX: p.x, targetY: p.y, hp: p.hp, isDead: p.isDead, weapon: p.weapon, facing: p.facing });
            } else {
              players[p.id] = p;
            }
          }
          if (msg.data.enemies) {
            for (const e of msg.data.enemies) {
              if (enemies[e.id]) {
                const prev = enemies[e.id];
                // Smooth interpolation targets
                enemies[e.id].targetX = e.x;
                enemies[e.id].targetY = e.y;
                enemies[e.id].hp = e.hp;
                enemies[e.id].isDead = e.isDead;
                enemies[e.id].state = e.state;
              } else {
                enemies[e.id] = { ...e, targetX: e.x, targetY: e.y };
              }
            }
          }
          break;

        case 's_chat':
          addChatMsg(msg.data.from, msg.data.text);
          break;

        case 's_damage': {
          const t = players[msg.data.targetId];
          if (t) {
            t.hitFlash = 10;
            t.hp = msg.data.targetHp;
            const tx = t.targetX ?? t.x, ty = t.targetY ?? t.y;
            spawnHit(tx, ty, msg.data.damage);
            spawnDmgNum(tx, ty, msg.data.damage);
            if (msg.data.targetId === myId) screenShake = 9;
          }
          break;
        }

        case 's_enemy_hit': {
          const en = enemies[msg.data.enemyId];
          if (en) {
            en.hitFlash = 8;
            en.hp = msg.data.enemyHp;
            const ex = en.targetX ?? en.x, ey = en.targetY ?? en.y;
            spawnHit(ex, ey, msg.data.damage);
            spawnDmgNum(ex, ey, msg.data.damage);
          }
          break;
        }

        case 's_enemy_dead': {
          const en = enemies[msg.data.enemyId];
          if (en) {
            en.isDead = true;
            spawnDeath(en.targetX ?? en.x, en.targetY ?? en.y);
            addSysMsg(`击杀了 ${en.kind}!`);
          }
          break;
        }

        case 's_dead':
          if (players[msg.data.id]) {
            players[msg.data.id].isDead = true;
            const p = players[msg.data.id];
            spawnDeath(p.targetX ?? p.x, p.targetY ?? p.y);
          }
          if (msg.data.id === myId) addSysMsg('☠ 你阵亡了！3秒后复活...');
          break;

        case 's_respawn':
          if (players[msg.data.id]) {
            Object.assign(players[msg.data.id], msg.data);
          } else {
            players[msg.data.id] = msg.data;
          }
          spawnRing(msg.data.x, msg.data.y, '#ffe066', 16);
          if (msg.data.id === myId) addSysMsg('✦ 已复活！');
          break;

        case 's_weather':
          if (weatherOverride) break;          // 调试强制天气时,忽略服务端下发
          weather = msg.data;
          addSysMsg(`天气变化: ${weatherLabel(weather.kind)}`);
          break;

        case 's_attack':
          triggerAttackAnim(msg.data);
          break;

        case 's_item_spawn': {
          const d = msg.data;
          drops[d.id] = d;
          if (d.rarity !== 'common') {
            spawnRing(d.x, d.y, RARITY_COLOR[d.rarity], 14);
            addSysMsg(`✧ 掉落了 ${RARITY_LABEL[d.rarity]}武器!`);
          }
          break;
        }

        case 's_item_pickup': {
          const d = drops[msg.data.dropId];
          if (msg.data.byPlayerId) {
            const w = WEAPONS[msg.data.weapon];
            if (d) { spawnRing(d.x, d.y, w ? RARITY_COLOR[w.rarity] : '#fff', 16); spawnDmgNumText(d.x, d.y, w ? w.label : '?', '#ffe066'); }
            if (players[msg.data.byPlayerId]) players[msg.data.byPlayerId].weapon = msg.data.weapon;
            if (msg.data.byPlayerId === myId && w) addSysMsg(`⚔ 拾取并装备了 ${w.label}（${RARITY_LABEL[w.rarity]}）`);
          }
          delete drops[msg.data.dropId];
          break;
        }

        case 's_pong':
          latency = Date.now() - (msg.data?.time || pingTime);
          break;

        case 's_error':
          addSysMsg(`错误: ${msg.data.msg}`);
          break;
      }
    }

    function addSysMsg(text) {
      const d = document.createElement('div');
      d.className = 'msg system';
      d.textContent = `[系统] ${text}`;
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addChatMsg(name, text) {
      const d = document.createElement('div');
      d.className = 'msg';
      d.innerHTML = `<span class="name">${esc(name)}:</span> <span class="text">${esc(text)}</span>`;
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── Input ────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (document.activeElement === chatInput) {
        if (e.key === 'Enter') {
          const text = chatInput.value.trim();
          if (text && ws) ws.send(JSON.stringify({ type: 'c_chat', data: { text } }));
          chatInput.value = '';
          chatInput.blur();
        }
        if (e.key === 'Escape') chatInput.blur();
        return;
      }
      if (e.key === 'Enter') { chatInput.focus(); return; }

      keys[e.key.toLowerCase()] = true;

      // ── 天气调试(纯客户端预览,不影响服务端/他人) ──────────────
      // T 循环切换天气;[ / ] 调强度;Y 取消覆盖,交回服务端权威
      const k = e.key.toLowerCase();
      if (k === 't') { cycleWeatherDebug(); return; }
      if (k === 'y') {
        weatherOverride = null;
        addSysMsg('天气已交回服务端权威');
        return;
      }
      if (k === '[' || k === ']') {
        const step = k === ']' ? 0.1 : -0.1;
        const it = Math.max(0.1, Math.min(1, (weather.intensity || 0) + step));
        weather = { ...weather, intensity: it };
        weatherOverride = { ...weather };
        addSysMsg(`天气强度: ${it.toFixed(1)}`);
        return;
      }

      if (e.key === ' ') {
        e.preventDefault();
        if (ws && connected && myId) {
          ws.send(JSON.stringify({ type: 'c_attack' }));
          lastAttackAt = Date.now(); // 冷却环 HUD 估算(权威冷却仍在服务端);挥击动画由 s_attack 回声驱动
        }
      }
    });

    // 客户端天气覆盖:非 null 时忽略服务端 s_weather,用于本地预览各类效果
    let weatherOverride = null;
    function cycleWeatherDebug() {
      const kinds = ['clear', 'rain', 'fog', 'snow'];
      const cur = kinds.indexOf(weather.kind);
      const next = kinds[(cur + 1) % kinds.length];
      const it = next === 'clear' ? 0 : (weather.intensity && weather.intensity > 0 ? weather.intensity : 0.8);
      weather = { kind: next, intensity: it };
      weatherOverride = { ...weather };
      addSysMsg(`[调试] 强制天气: ${weatherLabel(next)}${next === 'clear' ? '' : ` (强度 ${it.toFixed(1)})`}`);
    }

    document.addEventListener('keyup', e => {
      keys[e.key.toLowerCase()] = false;
    });

    function sendInput() {
      if (!ws || !connected || !myId) return;
      if (document.activeElement === chatInput) return;
      let dx = 0, dy = 0;
      if (keys['w'] || keys['arrowup'])    dy -= 1;
      if (keys['s'] || keys['arrowdown'])  dy += 1;
      if (keys['a'] || keys['arrowleft'])  dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;
      if (dx !== 0 || dy !== 0) {
        ws.send(JSON.stringify({ type: 'c_move', data: { dx, dy } }));
        if (players[myId]) players[myId]._moving = true;
      } else if (players[myId]?._moving) {
        ws.send(JSON.stringify({ type: 'c_stop' }));
        players[myId]._moving = false;
      }
    }
    setInterval(sendInput, 50);

    function startPing() {
      if (pingInterval) clearInterval(pingInterval); // 重连时避免叠加多个心跳定时器
      pingInterval = setInterval(() => {
        if (ws && connected) {
          pingTime = Date.now();
          ws.send(JSON.stringify({ type: 'c_ping', data: { time: pingTime } }));
        }
      }, 3000);
    }

    // ─── Particles ────────────────────────────────────────────
    function spawnParticles(x, y, n, cfg) {
      for (let i = 0; i < n; i++) {
        const angle = Math.PI * 2 * i / n + (Math.random() - 0.5) * 0.9;
        const spd   = cfg.spdMin + Math.random() * (cfg.spdMax - cfg.spdMin);
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          decay: cfg.decay ?? (0.03 + Math.random() * 0.04),
          size: cfg.szMin + Math.random() * (cfg.szMax - cfg.szMin),
          color: Array.isArray(cfg.color) ? cfg.color[i % cfg.color.length] : cfg.color,
          gravity: cfg.gravity ?? 0,
        });
      }
    }

    function spawnHit(x, y, dmg) {
      spawnParticles(x, y, Math.min(8 + dmg, 16), {
        spdMin: 1.5, spdMax: 4.5, szMin: 2, szMax: 5,
        color: ['#ff4444','#ff8844','#ffcc44','#ffffff'],
        decay: 0.055, gravity: 0.12,
      });
    }

    function spawnDeath(x, y) {
      spawnParticles(x, y, 22, {
        spdMin: 2.5, spdMax: 7, szMin: 3, szMax: 8,
        color: ['#e94560','#ff7070','#ffaa44','#ffffff'],
        decay: 0.022, gravity: 0.04,
      });
    }

    function spawnRing(x, y, color, n) {
      spawnParticles(x, y, n, {
        spdMin: 1.5, spdMax: 3.5, szMin: 2, szMax: 4,
        color, decay: 0.04,
      });
    }

    function spawnDmgNum(x, y, dmg) {
      damageNumbers.push({
        x, y, vy: -1.8, life: 1, decay: 0.022,
        text: `-${dmg}`,
        big: dmg >= 20,
      });
    }

    function updateFX() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += p.gravity; p.vx *= 0.91; p.vy *= 0.91;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = damageNumbers.length - 1; i >= 0; i--) {
        const d = damageNumbers[i];
        d.y += d.vy; d.vy *= 0.94;
        d.life -= d.decay;
        if (d.life <= 0) damageNumbers.splice(i, 1);
      }
      updateProjectiles();
      updateShockwaves();
    }

    // ─── Color helpers ────────────────────────────────────────
    const PCOLORS = ['#e94560','#4ecca3','#f0a500','#7c6af7','#2be0ff','#ff69b4','#7dff6a','#ff9944'];
    function pcolor(id) { return PCOLORS[id % PCOLORS.length]; }

    function lighten(hex, amt) {
      const n = parseInt(hex.slice(1), 16);
      const r = Math.min(255, (n >> 16) + amt);
      const g = Math.min(255, ((n >> 8) & 0xff) + amt);
      const b = Math.min(255, (n & 0xff) + amt);
      return `rgb(${r},${g},${b})`;
    }

    // ─── Draw map objects ─────────────────────────────────────
    function drawTree(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      const s = o.size;
      // Shadow
      ctx.save(); ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(sx + s * 0.25, sy + s * 0.55, s * 0.75, s * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Trunk
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(sx - s * 0.1, sy - s * 0.05, s * 0.2, s * 0.45);
      // Foliage palette per variant
      const palettes = [
        ['#1a5c1a','#2a7a2a','#1e6e1e','#266626'],
        ['#1a4a3a','#2a6a5a','#206050','#285848'],
        ['#2a3a1a','#3a5a2a','#2e4a1e','#384830'],
      ];
      const pal = palettes[o.variant % 3];
      ctx.fillStyle = pal[0];
      ctx.beginPath(); ctx.arc(sx, sy - s * 0.05, s * 0.88, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = pal[1];
      ctx.beginPath(); ctx.arc(sx - s * 0.2, sy - s * 0.28, s * 0.62, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = pal[2];
      ctx.beginPath(); ctx.arc(sx + s * 0.15, sy - s * 0.38, s * 0.58, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = pal[3];
      ctx.beginPath(); ctx.arc(sx, sy - s * 0.6, s * 0.5, 0, Math.PI * 2); ctx.fill();
      // Highlight
      ctx.save(); ctx.globalAlpha = 0.18;
      ctx.fillStyle = '#aaffaa';
      ctx.beginPath(); ctx.arc(sx - s * 0.15, sy - s * 0.45, s * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawBush(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      const s = o.size;
      ctx.fillStyle = '#245024';
      ctx.beginPath(); ctx.arc(sx, sy, s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#346034';
      ctx.beginPath(); ctx.arc(sx - s * 0.48, sy - s * 0.18, s * 0.72, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx + s * 0.42, sy - s * 0.25, s * 0.65, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#427a42';
      ctx.beginPath(); ctx.arc(sx - s * 0.08, sy - s * 0.55, s * 0.52, 0, Math.PI * 2); ctx.fill();
    }

    function drawFlower(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = o.color;
      ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // 服务端障碍物:按真实碰撞半径绘制的苔石巨砾(玩家会被它挡住/滑过)
    function drawObstacle(o) {
      const sx = o.x - camera.x, sy = o.y - camera.y;
      const r = o.radius;
      ctx.save();
      // 地面阴影
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(sx + r * 0.12, sy + r * 0.42, r * 1.02, r * 0.42, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // 石体(径向渐变模拟受光)
      const g = ctx.createRadialGradient(sx - r * 0.35, sy - r * 0.35, r * 0.2, sx, sy, r);
      g.addColorStop(0, '#6b6f7d');
      g.addColorStop(1, '#3a3d47');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
      // 顶部苔藓
      ctx.fillStyle = 'rgba(78,204,163,0.35)';
      ctx.beginPath(); ctx.arc(sx - r * 0.2, sy - r * 0.35, r * 0.5, 0, Math.PI * 2); ctx.fill();
      // 边缘描边(勾出碰撞轮廓)
      ctx.strokeStyle = 'rgba(20,22,28,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    function isVisible(x, y, pad) {
      const sx = x - camera.x, sy = y - camera.y;
      return sx > -pad && sx < canvas.width + pad && sy > -pad && sy < canvas.height + pad;
    }

    // ─── Enemy Sprites (Kenney Tiny Dungeon · CC0) ────────────────
    // 贴图: client/assets/enemies/{slime,skeleton,demon}.png
    // 来源: https://kenney.nl/assets/tiny-dungeon  许可: CC0 1.0
    // 加载失败 → 自动回退程序化像素画(同天气系统的范式 A/B 设计)
    const ENEMY_SPRITE_PATHS = {
      slime:    'assets/enemies/slime.png',
      skeleton: 'assets/enemies/skeleton.png',
      demon:    'assets/enemies/demon.png',
    };
    const _enemySprites = {};
    function loadEnemySprite(kind) {
      if (kind in _enemySprites) return _enemySprites[kind];
      const img = new Image();
      img.onerror = () => { _enemySprites[kind] = null; };
      img.src = ENEMY_SPRITE_PATHS[kind] || '';
      _enemySprites[kind] = img;
      return img;
    }
    const spriteOK = img => !!img && img.complete && img.naturalWidth > 0;

    // Enemy kind visual config (fallback procedural drawing colors)
    const ENEMY_VIS = {
      slime:    { color: '#43e1b3', accent: '#25956a', glow: '#00ffaa', label: '史莱姆' },
      skeleton: { color: '#c0cbdc', accent: '#8b9bb4', glow: '#aabbcc', label: '骷髅兵' },
      demon:    { color: '#e84537', accent: '#c02010', glow: '#ff4422', label: '火焰恶魔' },
    };

    // Pre-generate procedural sprite canvases (one per kind, cached)
    const _procSprites = {};
    function getProcSprite(kind) {
      if (_procSprites[kind]) return _procSprites[kind];
      const vis = ENEMY_VIS[kind] || ENEMY_VIS.slime;
      const oc = document.createElement('canvas');
      oc.width = 32; oc.height = 32;
      const oc2 = oc.getContext('2d');
      drawProceduralEnemy(oc2, kind, vis, 16, 16);
      _procSprites[kind] = oc;
      return oc;
    }

    function drawProceduralEnemy(oc2, kind, vis, cx, cy) {
      // pixel art style: draw at 2x pixel grid (each "pixel" = 2x2 real pixels)
      const px = (col, row, color, w=2, h=2) => {
        oc2.fillStyle = color;
        oc2.fillRect(cx - 14 + col * 2, cy - 14 + row * 2, w, h);
      };

      if (kind === 'slime') {
        const c = vis.color, d = vis.accent, hi = '#96ffe6';
        // body rows (7×5 grid, 0-indexed)
        const body = [
          '..ccc..',
          '.cdddc.',
          'ccdddcc',
          'ccdddcc',
          '.ccccc.',
          '..ccc..',
        ];
        body.forEach((row, r) => [...row].forEach((ch, c2) => {
          if (ch === 'c') px(c2+1, r+2, c);
          else if (ch === 'd') px(c2+1, r+2, d);
        }));
        // eyes
        px(2, 3, '#fff'); px(4, 3, '#fff');
        px(2, 3, '#1a1a2e', 1, 1); px(4, 3, '#1a1a2e', 1, 1);
        // highlight
        px(2, 2, 'rgba(255,255,255,0.5)');
      } else if (kind === 'skeleton') {
        const c = vis.color, d = vis.accent;
        // skull
        oc2.fillStyle = c;
        oc2.fillRect(cx-6, cy-13, 12, 10);
        // eye sockets
        oc2.fillStyle = '#3f2631';
        oc2.fillRect(cx-5, cy-11, 4, 4);
        oc2.fillRect(cx+1, cy-11, 4, 4);
        // body
        oc2.fillStyle = c;
        oc2.fillRect(cx-4, cy-3, 8, 8);
        oc2.fillStyle = d;
        oc2.fillRect(cx-3, cy-1, 2, 4); oc2.fillRect(cx+1, cy-1, 2, 4);
        // ribs
        oc2.fillStyle = '#3f2631';
        oc2.fillRect(cx-3, cy-2, 6, 1); oc2.fillRect(cx-3, cy, 6, 1); oc2.fillRect(cx-3, cy+2, 6, 1);
        // legs
        oc2.fillStyle = c;
        oc2.fillRect(cx-4, cy+5, 3, 6); oc2.fillRect(cx+1, cy+5, 3, 6);
      } else { // demon
        const c = vis.color, d = vis.accent;
        // head + horns
        oc2.fillStyle = '#8b0000'; // dark red horns
        oc2.fillRect(cx-7, cy-15, 3, 6); oc2.fillRect(cx+4, cy-15, 3, 6);
        // head
        oc2.fillStyle = c;
        oc2.fillRect(cx-6, cy-12, 12, 10);
        // eyes (glowing)
        oc2.fillStyle = '#ffcc00';
        oc2.fillRect(cx-4, cy-10, 4, 3); oc2.fillRect(cx+1, cy-10, 4, 3);
        oc2.fillStyle = '#ff4400';
        oc2.fillRect(cx-3, cy-10, 2, 2); oc2.fillRect(cx+2, cy-10, 2, 2);
        // body
        oc2.fillStyle = d;
        oc2.fillRect(cx-5, cy-2, 10, 9);
        // wings
        oc2.fillStyle = '#6b0000';
        oc2.fillRect(cx-11, cy-2, 6, 6); oc2.fillRect(cx+5, cy-2, 6, 6);
        // legs
        oc2.fillStyle = c;
        oc2.fillRect(cx-4, cy+7, 3, 5); oc2.fillRect(cx+1, cy+7, 3, 5);
      }
    }

    // ─── Draw Enemy ────────────────────────────────────────────────
    function drawEnemy(e) {
      // Smooth interpolation (same pattern as players)
      if (e.targetX !== undefined) {
        if (!e.x) e.x = e.targetX;
        if (!e.y) e.y = e.targetY;
        e.x += (e.targetX - e.x) * 0.22;
        e.y += (e.targetY - e.y) * 0.22;
      }

      if (!isVisible(e.x, e.y, 60)) return;
      const sx = Math.round(e.x - camera.x);
      const sy = Math.round(e.y - camera.y);
      const vis = ENEMY_VIS[e.kind] || ENEMY_VIS.slime;
      const R = 14;

      if (e.isDead) {
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = vis.color;
        ctx.beginPath(); ctx.arc(sx, sy, R, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        return;
      }

      if (e.hitFlash > 0) e.hitFlash--;

      // Ground shadow
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(sx + 2, sy + R - 2, R * 0.8, R * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Glow ring (ambient / attack state)
      if (e.state === 'attack' || e.state === 'chase') {
        const grd = ctx.createRadialGradient(sx, sy, R * 0.5, sx, sy, R * 2.2);
        grd.addColorStop(0, vis.glow + '44');
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(sx, sy, R * 2.2, 0, Math.PI * 2); ctx.fill();
      }

      // Try sprite rendering (Kenney Tiny Dungeon, 16×16 → drawn at 2×)
      const spr = loadEnemySprite(e.kind);
      if (spriteOK(spr)) {
        ctx.save();
        if (e.hitFlash > 0) {
          ctx.filter = 'brightness(3) saturate(0)';
        }
        // Draw 16×16 sprite scaled to 32×32, centered on (sx, sy-2) for visual balance
        ctx.imageSmoothingEnabled = false; // keep pixel art crisp
        ctx.drawImage(spr, sx - 16, sy - 18, 32, 32);
        ctx.restore();
      } else {
        // Procedural fallback
        const proc = getProcSprite(e.kind);
        ctx.save();
        if (e.hitFlash > 0) ctx.filter = 'brightness(3) saturate(0)';
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(proc, sx - 16, sy - 16);
        ctx.restore();
      }

      // Name/kind label
      const label = vis.label || e.kind;
      ctx.font = 'bold 10px Courier New';
      ctx.textAlign = 'center';
      const tw = ctx.measureText(label).width;
      const nameY = sy - R - 14;
      ctx.save();
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#000';
      ctx.fillRect(sx - tw / 2 - 4, nameY - 10, tw + 8, 13);
      ctx.restore();
      ctx.fillStyle = vis.color;
      ctx.fillText(label, sx, nameY);

      // HP bar
      const bW = 34, bH = 4;
      const bX = sx - bW / 2, bY = sy - R - 7;
      const ratio = Math.max(0, e.hp / (e.maxHp || 1));
      const hpColor = ratio > 0.6 ? '#4ecca3' : ratio > 0.3 ? '#f0a500' : '#e94560';
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bX - 1, bY - 1, bW + 2, bH + 2);
      ctx.fillStyle = '#111';
      ctx.fillRect(bX, bY, bW, bH);
      ctx.fillStyle = hpColor;
      ctx.fillRect(bX, bY, bW * ratio, bH);
    }

    // ═══ Weapons & Drops ═════════════════════════════════════════
    // 武器数值/稀有度是服务端权威(见 src/core/Weapon.ts);客户端只留一份只读副本
    // 用于 HUD 显示与动画时长参数。贴图走 assets/weapons/*.png(Kenney CC0),
    // 缺文件时回退程序化图标(与敌人/天气同一「范式 A/B」思路)。
    const RARITY_COLOR = { common: '#b5c6d6', rare: '#4ea3ff', epic: '#b06bff' };
    const RARITY_LABEL = { common: '普通', rare: '稀有', epic: '史诗' };
    const WEAPONS = {
      fist:       { label: '徒手', rarity: 'common', cooldown: 1000, dur: 12, range: 80  },
      dagger:     { label: '匕首', rarity: 'common', cooldown: 450,  dur: 14, range: 70  },
      sword:      { label: '铁剑', rarity: 'common', cooldown: 800,  dur: 18, range: 105 },
      greatsword: { label: '巨剑', rarity: 'rare',   cooldown: 1250, dur: 26, range: 120 },
      axe:        { label: '战斧', rarity: 'rare',   cooldown: 1400, dur: 24, range: 95  },
      hammer:     { label: '战锤', rarity: 'epic',   cooldown: 1700, dur: 30, range: 100 },
      staff:      { label: '法杖', rarity: 'epic',   cooldown: 1150, dur: 22, range: 240 },
    };

    // ── 武器贴图(Kenney Tiny Dungeon · CC0)+ 程序化兜底 ──────────────
    const WEAPON_SPRITE_PATHS = {
      dagger: 'assets/weapons/dagger.png', sword: 'assets/weapons/sword.png',
      greatsword: 'assets/weapons/greatsword.png', axe: 'assets/weapons/axe.png',
      hammer: 'assets/weapons/hammer.png', staff: 'assets/weapons/staff.png',
    };
    const _weaponSprites = {};
    function loadWeaponSprite(kind) {
      if (kind in _weaponSprites) return _weaponSprites[kind];
      const path = WEAPON_SPRITE_PATHS[kind];
      if (!path) { _weaponSprites[kind] = null; return null; }
      const img = new Image();
      img.onerror = () => { _weaponSprites[kind] = null; };
      img.src = path;
      _weaponSprites[kind] = img;
      return img;
    }
    const _procWeapons = {};
    function getProcWeapon(kind) {
      if (_procWeapons[kind]) return _procWeapons[kind];
      const oc = document.createElement('canvas'); oc.width = 16; oc.height = 16;
      const c = oc.getContext('2d');
      if (kind === 'dagger' || kind === 'sword' || kind === 'greatsword') {
        const len = kind === 'dagger' ? 7 : kind === 'sword' ? 10 : 12;
        c.strokeStyle = '#cdd6e6'; c.lineWidth = kind === 'greatsword' ? 3 : 2;
        c.beginPath(); c.moveTo(8, 15); c.lineTo(8, 15 - len); c.stroke();
        c.strokeStyle = '#8a6a3a'; c.lineWidth = 2;
        c.beginPath(); c.moveTo(5, 13); c.lineTo(11, 13); c.stroke();
      } else if (kind === 'axe') {
        c.fillStyle = '#8a6a3a'; c.fillRect(7, 3, 2, 12);
        c.fillStyle = '#b8c0cc'; c.beginPath(); c.moveTo(9, 3); c.lineTo(14, 6); c.lineTo(9, 9); c.fill();
      } else if (kind === 'hammer') {
        c.fillStyle = '#8a6a3a'; c.fillRect(7, 5, 2, 10);
        c.fillStyle = '#9aa4b2'; c.fillRect(4, 3, 8, 4);
      } else if (kind === 'staff') {
        c.fillStyle = '#8a6a3a'; c.fillRect(7, 5, 2, 10);
        c.fillStyle = '#b06bff'; c.beginPath(); c.arc(8, 4, 3, 0, Math.PI * 2); c.fill();
      }
      _procWeapons[kind] = oc; return oc;
    }
    function drawWeaponIcon(cx, cy, kind, size) {
      const spr = loadWeaponSprite(kind);
      ctx.save(); ctx.imageSmoothingEnabled = false;
      if (spriteOK(spr)) ctx.drawImage(spr, cx - size / 2, cy - size / 2, size, size);
      else ctx.drawImage(getProcWeapon(kind), cx - size / 2, cy - size / 2, size, size);
      ctx.restore();
    }

    // ── 收到 s_attack:给攻击者挂一段挥击动画状态(所有客户端同步播放) ──────
    function triggerAttackAnim(data) {
      const p = players[data.attackerId];
      if (!p) return;
      const w = WEAPONS[data.weapon] || WEAPONS.fist;
      p.attackAnim = { weapon: data.weapon, dir: data.dir || 0, t: 0, dur: w.dur,
                       reach: Math.max(40, data.range || w.range || 80), impacted: false, fired: false };
      p.facing = data.dir ?? p.facing ?? 0;
    }

    // ── 武器攻击动画:按武器类型分支,进度 t(0→1,帧驱动) ───────────────────
    function drawSlashArc(sx, sy, r, lead, span, rgbaPrefix, width, t) {
      ctx.save(); ctx.lineCap = 'round';
      for (let i = 0; i < 5; i++) {                 // 残影月牙:多段渐隐模拟挥砍拖尾
        const a0 = lead - span * (i / 5);
        const alpha = (1 - i / 5) * (1 - t * 0.3) * 0.8;
        ctx.strokeStyle = `${rgbaPrefix}${alpha})`;
        ctx.lineWidth = width * (1 - i / 6);
        ctx.beginPath(); ctx.arc(sx, sy, r, a0 - 0.12, a0); ctx.stroke();
      }
      const tx = sx + Math.cos(lead) * r, ty = sy + Math.sin(lead) * r;
      ctx.fillStyle = `${rgbaPrefix}0.95)`;
      ctx.beginPath(); ctx.arc(tx, ty, width * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    function drawWeaponAttack(p, sx, sy) {
      const a = p.attackAnim; if (!a) return;
      a.t += 1 / a.dur;
      const t = Math.min(1, a.t), dir = a.dir, reach = a.reach;
      const pt = (ang, r) => [sx + Math.cos(ang) * r, sy + Math.sin(ang) * r];
      ctx.save(); ctx.lineCap = 'round';

      if (a.weapon === 'fist') {                    // 徒手:扩散光环(旧行为)
        const rr = 8 + t * (reach * 0.9);
        ctx.strokeStyle = `rgba(255,220,80,${(1 - t) * 0.85})`; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(sx, sy, rr, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = `rgba(255,180,40,${(1 - t) * 0.4})`; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(sx, sy, rr * 0.55, 0, Math.PI * 2); ctx.stroke();
      } else if (a.weapon === 'dagger') {           // 匕首:两段快速短刺
        const pulse = Math.abs(Math.sin(t * Math.PI * 2));
        const [x0, y0] = pt(dir, 10), [x1, y1] = pt(dir, reach * (0.5 + 0.5 * pulse));
        ctx.strokeStyle = 'rgba(220,240,255,0.9)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.beginPath(); ctx.arc(x1, y1, 2.4, 0, Math.PI * 2); ctx.fill();
      } else if (a.weapon === 'sword') {            // 铁剑:横向大挥砍弧
        const SW = 1.15, cur = dir - SW + t * 2 * SW;
        drawSlashArc(sx, sy, reach, cur, 0.7, 'rgba(255,255,255,', 4, t);
      } else if (a.weapon === 'greatsword') {       // 巨剑:360° 旋风斩(偏蓝更厚)
        const cur = dir + t * Math.PI * 2;
        drawSlashArc(sx, sy, reach, cur, 1.1, 'rgba(150,200,255,', 6, t);
      } else if (a.weapon === 'axe' || a.weapon === 'hammer') { // 斧/锤:过顶下劈 + 落地震波
        const heavy = a.weapon === 'hammer';
        const e = t * t * (3 - 2 * t);              // smoothstep 缓出
        const cur = dir - Math.PI * 0.95 + e * (Math.PI * 0.95);
        const [hx, hy] = pt(cur, reach * 0.95);
        ctx.strokeStyle = heavy ? 'rgba(200,210,225,0.95)' : 'rgba(210,220,235,0.9)';
        ctx.lineWidth = heavy ? 7 : 5;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(hx, hy); ctx.stroke();
        ctx.fillStyle = heavy ? '#aab2c0' : '#b8c0cc';
        ctx.beginPath(); ctx.arc(hx, hy, heavy ? 7 : 5, 0, Math.PI * 2); ctx.fill();
        if (!a.impacted && t >= 0.6) {              // 命中落地(一次):震波 + 屏震 + 尘土
          a.impacted = true;
          const wx = p.x + Math.cos(dir) * reach * 0.85, wy = p.y + Math.sin(dir) * reach * 0.85;
          shockwaves.push({ x: wx, y: wy, r: heavy ? 6 : 4, max: heavy ? 70 : 48, life: 1,
                            color: heavy ? '#ffd27a' : '#dfe6f0', width: heavy ? 4 : 3 });
          screenShake = Math.max(screenShake, heavy ? 13 : 7);
          spawnParticles(wx, wy, heavy ? 14 : 8, { spdMin: 1.5, spdMax: heavy ? 5 : 3.5,
            szMin: 2, szMax: heavy ? 5 : 4, color: ['#b8a07a', '#8a6a3a', '#d8c8a0'], decay: 0.05, gravity: 0.15 });
        }
      } else if (a.weapon === 'staff') {            // 法杖:蓄力辉光 → 释放飞行法球
        const [gx, gy] = pt(dir, 16);
        const glow = t < 0.35 ? t / 0.35 : Math.max(0, 1 - (t - 0.35) / 0.3);
        if (glow > 0) {
          const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, 10 * glow + 3);
          g.addColorStop(0, 'rgba(210,170,255,0.9)'); g.addColorStop(1, 'rgba(176,107,255,0)');
          ctx.fillStyle = g; ctx.beginPath(); ctx.arc(gx, gy, 10 * glow + 3, 0, Math.PI * 2); ctx.fill();
        }
        if (!a.fired && t >= 0.35) { a.fired = true; spawnProjectile(p.x, p.y, dir, 'orb'); }
      }
      ctx.restore();
      if (a.t >= 1) p.attackAnim = null;
    }
    // 未攻击时,在身侧展示当前持握的武器
    function drawHeldWeapon(p, sx, sy, R) {
      const f = p.facing || 0;
      drawWeaponIcon(sx + Math.cos(f) * (R + 3), sy + Math.sin(f) * (R + 1), p.weapon, 15);
    }

    // ── 地面掉落物 ────────────────────────────────────────────────────
    function drawDrops() {
      for (const id in drops) {
        const d = drops[id];
        if (!isVisible(d.x, d.y, 40)) continue;
        const sx = Math.round(d.x - camera.x), sy = Math.round(d.y - camera.y);
        const col = RARITY_COLOR[d.rarity] || '#b5c6d6';
        const bob = Math.sin(frame * 0.08 + d.id) * 3;
        const pulse = 0.5 + 0.5 * Math.sin(frame * 0.1 + d.id);
        ctx.save(); ctx.globalAlpha = 0.28; ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.ellipse(sx, sy + 8, 10, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        const gr = ctx.createRadialGradient(sx, sy - bob, 2, sx, sy - bob, 20);
        gr.addColorStop(0, col + (d.rarity === 'common' ? '44' : '66'));
        gr.addColorStop(1, 'transparent');
        ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(sx, sy - bob, 20, 0, Math.PI * 2); ctx.fill();
        drawWeaponIcon(sx, sy - bob - 2, d.kind, 26);
        ctx.save(); ctx.strokeStyle = col; ctx.globalAlpha = 0.35 + 0.45 * pulse; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(sx, sy - bob - 2, 14, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
        if (d.rarity === 'epic' && Math.random() < 0.25)
          spawnParticles(d.x, d.y - 6, 1, { spdMin: 0.3, spdMax: 1.2, szMin: 1, szMax: 2, color: [col, '#ffffff'], decay: 0.05, gravity: -0.02 });
      }
    }

    // ── 飞行物(法球/箭)+ 重击震波环 ────────────────────────────────────
    function spawnProjectile(x, y, dir, kind) {
      const spd = kind === 'arrow' ? 15 : 10;
      projectiles.push({ x, y, vx: Math.cos(dir) * spd, vy: Math.sin(dir) * spd, dir, kind,
                         dist: 0, max: kind === 'orb' ? 250 : 320, color: kind === 'orb' ? '#b06bff' : '#ffd27a' });
    }
    function updateProjectiles() {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx; p.y += p.vy; p.dist += Math.hypot(p.vx, p.vy);
        if (p.dist >= p.max) {
          if (p.kind === 'orb') {
            spawnRing(p.x, p.y, p.color, 12);
            spawnParticles(p.x, p.y, 10, { spdMin: 1, spdMax: 3.5, szMin: 2, szMax: 4, color: [p.color, '#e0c8ff', '#fff'], decay: 0.05 });
          } else spawnParticles(p.x, p.y, 6, { spdMin: 1, spdMax: 3, szMin: 1, szMax: 3, color: [p.color, '#fff'], decay: 0.06 });
          projectiles.splice(i, 1);
        }
      }
    }
    function drawProjectiles() {
      for (const p of projectiles) {
        if (!isVisible(p.x, p.y, 30)) continue;
        const sx = p.x - camera.x, sy = p.y - camera.y;
        if (p.kind === 'orb') {
          const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 9);
          g.addColorStop(0, '#fff'); g.addColorStop(0.4, p.color); g.addColorStop(1, 'transparent');
          ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx, sy, 9, 0, Math.PI * 2); ctx.fill();
        } else {
          ctx.save(); ctx.translate(sx, sy); ctx.rotate(p.dir);
          ctx.strokeStyle = p.color; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(6, 0); ctx.stroke();
          ctx.fillStyle = p.color; ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(2, -2); ctx.lineTo(2, 2); ctx.fill();
          ctx.restore();
        }
      }
    }
    function updateShockwaves() {
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const s = shockwaves[i];
        s.r += (s.max - s.r) * 0.18; s.life -= 0.045;
        if (s.life <= 0) shockwaves.splice(i, 1);
      }
    }
    function drawShockwaves() {
      for (const s of shockwaves) {
        if (!isVisible(s.x, s.y, s.max + 20)) continue;
        const sx = s.x - camera.x, sy = s.y - camera.y;
        ctx.save(); ctx.globalAlpha = Math.max(0, s.life) * 0.8;
        ctx.strokeStyle = s.color; ctx.lineWidth = s.width;
        ctx.beginPath(); ctx.ellipse(sx, sy, s.r, s.r * 0.5, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }
    }

    // 浮动文本(拾取提示等,复用 damageNumbers 池)
    function spawnDmgNumText(x, y, text, color) {
      damageNumbers.push({ x, y, vy: -1.6, life: 1, decay: 0.02, text, color, big: false });
    }

    // ─── Draw player ──────────────────────────────────────────
    function drawPlayer(p, id) {
      // Smooth interpolate
      if (p.targetX !== undefined) {
        p.x += (p.targetX - p.x) * 0.28;
        p.y += (p.targetY - p.y) * 0.28;
      }

      const sx = Math.round(p.x - camera.x);
      const sy = Math.round(p.y - camera.y);
      if (!isVisible(p.x, p.y, 80)) return;

      const isMe = parseInt(id) === myId;
      const R = 14;

      if (p.isDead) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#8888aa';
        ctx.beginPath(); ctx.arc(sx, sy, R, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#e94560';
        ctx.font = '16px serif';
        ctx.textAlign = 'center';
        ctx.fillText('☠', sx, sy + 6);
        ctx.restore();
        return;
      }

      if (p.hitFlash && p.hitFlash > 0) p.hitFlash--;

      const baseColor = p.hitFlash > 0 ? '#ff5555' : (isMe ? '#4ecca3' : pcolor(parseInt(id)));

      // Ground shadow
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(sx + 2, sy + R - 1, R * 0.85, R * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Glow for self
      if (isMe) {
        const grd = ctx.createRadialGradient(sx, sy, R, sx, sy, R * 2.8);
        grd.addColorStop(0, 'rgba(78,204,163,0.18)');
        grd.addColorStop(1, 'rgba(78,204,163,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(sx, sy, R * 2.8, 0, Math.PI * 2); ctx.fill();
      }

      // Body gradient
      const grad = ctx.createRadialGradient(sx - 4, sy - 4, 1, sx, sy, R);
      grad.addColorStop(0, lighten(baseColor, 50));
      grad.addColorStop(0.5, baseColor);
      grad.addColorStop(1, lighten(baseColor, -30));
      ctx.beginPath(); ctx.arc(sx, sy, R, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Border
      ctx.strokeStyle = isMe ? '#ffffff' : lighten(baseColor, 30);
      ctx.lineWidth = isMe ? 2 : 1.5;
      ctx.stroke();

      // Inner detail ring
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(sx, sy, R * 0.6, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      // 攻击冷却环(仅自己):估算当前武器冷却进度,画在脚下
      if (isMe && p.weapon) {
        const cd = (WEAPONS[p.weapon] || WEAPONS.fist).cooldown;
        const prog = Math.min(1, (Date.now() - lastAttackAt) / cd);
        if (prog < 1) {
          ctx.save();
          ctx.strokeStyle = 'rgba(78,204,163,0.85)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(sx, sy + R + 6, 5, -Math.PI / 2, -Math.PI / 2 + prog * Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      // 武器动画:攻击中播挥击,否则在身侧展示持握武器(徒手不画图标)
      if (p.attackAnim) drawWeaponAttack(p, sx, sy);
      else if (p.weapon && p.weapon !== 'fist' && !p.isDead) drawHeldWeapon(p, sx, sy, R);

      // Name tag
      const name = p.name || `P${id}`;
      ctx.font = `bold 11px Courier New`;
      ctx.textAlign = 'center';
      const tw = ctx.measureText(name).width;
      const nameY = sy - R - 14;
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#000010';
      ctx.fillRect(sx - tw / 2 - 5, nameY - 11, tw + 10, 14);
      ctx.restore();
      ctx.fillStyle = isMe ? '#4ecca3' : '#e8e8e8';
      ctx.fillText(name, sx, nameY);

      // HP bar
      const bW = 38, bH = 4;
      const bX = sx - bW / 2, bY = sy - R - 7;
      const ratio = Math.max(0, (p.hp || 0) / (p.maxHp || 100));
      const hpColor = ratio > 0.6 ? '#4ecca3' : ratio > 0.3 ? '#f0a500' : '#e94560';

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bX - 1, bY - 1, bW + 2, bH + 2);
      ctx.fillStyle = '#111';
      ctx.fillRect(bX, bY, bW, bH);
      ctx.fillStyle = hpColor;
      ctx.fillRect(bX, bY, bW * ratio, bH);

      if (ratio > 0) {
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.shadowColor = hpColor;
        ctx.shadowBlur = 6;
        ctx.fillStyle = hpColor;
        ctx.fillRect(bX, bY, bW * ratio, bH);
        ctx.restore();
      }
    }

    // ─── Minimap ──────────────────────────────────────────────
    function drawMinimap() {
      const mw = mmCanvas.width, mh = mmCanvas.height;
      mmCtx.clearRect(0, 0, mw, mh);
      mmCtx.fillStyle = 'rgba(4,8,18,0.9)';
      mmCtx.fillRect(0, 0, mw, mh);

      const sx = mw / mapWidth, sy = mh / mapHeight;

      // 障碍物:树=绿点,石=灰点(按视觉尺寸缩放)
      for (const o of obstacles) {
        if (o.type === 'tree') {
          mmCtx.fillStyle = '#1a4a1a';
          mmCtx.fillRect(o.x * sx - 1, o.y * sy - 1, 2.5, 2.5);
        } else {
          mmCtx.fillStyle = '#8b8f9c';
          mmCtx.beginPath();
          mmCtx.arc(o.x * sx, o.y * sy, Math.max(1.5, o.radius * sx), 0, Math.PI * 2);
          mmCtx.fill();
        }
      }

      // Viewport rect
      mmCtx.strokeStyle = 'rgba(255,255,255,0.15)';
      mmCtx.lineWidth = 1;
      mmCtx.strokeRect(camera.x * sx, camera.y * sy, canvas.width * sx, canvas.height * sy);

      // Players
      // Enemies on minimap (colored by kind)
      const ENEMY_MM_COLOR = { slime: '#43e1b3', skeleton: '#8b9bb4', demon: '#e84537' };
      for (const e of Object.values(enemies)) {
        if (e.isDead) continue;
        const ex = (e.targetX ?? e.x) * sx;
        const ey = (e.targetY ?? e.y) * sy;
        mmCtx.fillStyle = ENEMY_MM_COLOR[e.kind] || '#ff8800';
        mmCtx.beginPath();
        mmCtx.arc(ex, ey, 1.5, 0, Math.PI * 2);
        mmCtx.fill();
      }

      // 武器掉落物(按稀有度上色的小点)
      for (const id in drops) {
        const d = drops[id];
        mmCtx.fillStyle = RARITY_COLOR[d.rarity] || '#b5c6d6';
        mmCtx.fillRect(d.x * sx - 1, d.y * sy - 1, 2, 2);
      }

      for (const [id, p] of Object.entries(players)) {
        if (p.isDead) continue;
        const px = (p.targetX ?? p.x) * sx;
        const py = (p.targetY ?? p.y) * sy;
        mmCtx.fillStyle = parseInt(id) === myId ? '#4ecca3' : '#e94560';
        mmCtx.beginPath();
        mmCtx.arc(px, py, parseInt(id) === myId ? 3 : 2, 0, Math.PI * 2);
        mmCtx.fill();
      }

      // Border
      mmCtx.strokeStyle = '#2a5a8a';
      mmCtx.lineWidth = 1;
      mmCtx.strokeRect(0, 0, mw, mh);
    }

    // ─── Render loop ──────────────────────────────────────────
    function render(now) {
      requestAnimationFrame(render);
      frame++;

      resize();
      const W = canvas.width, H = canvas.height;

      // Screen shake
      let shX = 0, shY = 0;
      if (screenShake > 0) {
        shX = (Math.random() - 0.5) * screenShake;
        shY = (Math.random() - 0.5) * screenShake;
        screenShake = Math.max(0, screenShake - 1.2);
      }
      ctx.save();
      ctx.translate(shX, shY);

      // Smooth camera
      const me = players[myId];
      if (me) {
        const tx = (me.targetX ?? me.x) - W / 2;
        const ty = (me.targetY ?? me.y) - H / 2;
        camera.x += (tx - camera.x) * 0.1;
        camera.y += (ty - camera.y) * 0.1;
      }

      // ── Background ─────────────────────────────────────────
      ctx.fillStyle = '#1c3c1c';
      ctx.fillRect(0, 0, W, H);

      // Subtle grass tiles
      ctx.strokeStyle = 'rgba(28,70,28,0.55)';
      ctx.lineWidth = 1;
      const gs = 80;
      const ox = -(camera.x % gs), oy = -(camera.y % gs);
      for (let x = ox; x < W; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = oy; y < H; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Map boundary glow
      const bx = -camera.x, by = -camera.y;
      ctx.save();
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#e94560';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(bx, by, mapWidth, mapHeight);
      ctx.restore();

      // ── Sort objects for Y-depth ────────────────────────────
      const visObj = mapObjects.filter(o => isVisible(o.x, o.y, 120));
      visObj.sort((a, b) => a.y - b.y);

      // 装饰物(客户端本地、无碰撞):花、灌木 —— 地面层
      for (const o of visObj) {
        if (o.type === 'flower') drawFlower(o);
        else if (o.type === 'bush') drawBush(o);
      }

      // 服务端障碍物拆成两层:石在玩家下,树冠在玩家上(可走到树荫下被遮挡)
      const rocks = [], trees = [];
      for (const o of obstacles) {
        if (o.type === 'tree') { if (isVisible(o.x, o.y, o.size + 80)) trees.push(o); }
        else if (isVisible(o.x, o.y, o.radius + 40)) rocks.push(o);
      }
      rocks.sort((a, b) => a.y - b.y);
      trees.sort((a, b) => a.y - b.y);

      // 石(碰撞体,玩家之下)
      for (const o of rocks) drawObstacle(o);

      // 地面层:武器掉落物 + 重击震波环(均在玩家之下,可被玩家覆盖)
      drawDrops();
      drawShockwaves();

      // ── Enemies + Players sorted together by Y ──────────────────
      // 合并排序让敌人与玩家按 Y 轴正确叠层
      const drawList = [];
      for (const [id, p] of Object.entries(players))
        drawList.push({ tag: 'player', obj: p, id, y: p.y || 0 });
      for (const e of Object.values(enemies))
        if (!e.isDead) drawList.push({ tag: 'enemy', obj: e, y: e.y || 0 });
      drawList.sort((a, b) => a.y - b.y);
      for (const item of drawList) {
        if (item.tag === 'player') drawPlayer(item.obj, item.id);
        else drawEnemy(item.obj);
      }
      // Dead enemies rendered as faint markers (behind everything)
      for (const e of Object.values(enemies)) if (e.isDead) drawEnemy(e);

      // 飞行物(法球/箭)—— 飞在玩家之上
      drawProjectiles();

      // 树(树干挡人,树冠盖在玩家头顶)
      for (const o of trees) drawTree(o);

      // ── Particles ───────────────────────────────────────────
      updateFX();
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x - camera.x, p.y - camera.y, p.size * p.life + 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // ── Damage numbers ──────────────────────────────────────
      for (const d of damageNumbers) {
        const dx = d.x - camera.x, dy = d.y - camera.y;
        const fs = d.big ? 15 : 12;
        ctx.save();
        ctx.globalAlpha = d.life;
        ctx.font = `bold ${fs}px Courier New`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(0,0,0,0.75)';
        ctx.lineWidth = 3;
        ctx.strokeText(d.text, dx, dy);
        ctx.fillStyle = d.color || (d.big ? '#ffdd00' : '#ff7766');
        ctx.fillText(d.text, dx, dy);
        ctx.restore();
      }

      // ── Vignette ────────────────────────────────────────────
      const vig = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.85);
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(1, 'rgba(0,0,0,0.48)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      ctx.restore(); // end screen shake

      // ── Weather overlay (屏幕空间,不随震动/摄像机移动) ──────────
      drawWeather(W, H);

      // ── HUD ─────────────────────────────────────────────────
      const aliveEnemies = Object.values(enemies).filter(e => !e.isDead).length;
      const myW = WEAPONS[players[myId]?.weapon] || WEAPONS.fist;
      const wCol = RARITY_COLOR[myW.rarity] || '#eee';
      statsEl.innerHTML = `PING: ${latency}ms  ·  PLAYERS: ${Object.keys(players).length}  ·  ENEMIES: ${aliveEnemies}  ·  ${weatherLabel(weather.kind)}  ·  <span style="color:${wCol}">⚔ ${myW.label}</span>`;

      drawMinimap();
    }

    // ═══ Weather ══════════════════════════════════════════════════
    // 服务端只下发 { kind, intensity };所有视觉细节在客户端「程序化」生成,
    // 天然随 intensity 缩放、零资源依赖(范式 A)。雪花额外提供可选的贴图
    // 渲染分支(范式 B):配置了贴图就用贴图,否则自动回退程序化 —— 默认零资源可跑。
    function weatherLabel(kind) {
      return ({ clear: '☀ 晴', rain: '🌧 雨', fog: '🌫 雾', snow: '❄ 雪' })[kind] || kind;
    }

    // ── 分层粒子池(对象池:按目标数量增删,避免每帧新建) ──────────────
    const fx = {
      kind: 'clear',
      ramp: 0,          // 天气切换后的淡入进度 0→1,让色调/粒子平滑登场
      rain: [],         // 雨滴:每滴带景深 d,决定长度/速度/亮度(近实远虚)
      ripples: [],      // 雨点落地的溅射涟漪(top-down:散布全屏而非仅屏幕底)
      snow: [],         // 雪花:多层视差 + 摆动飘落
      fog: [],          // 体积雾团:柔光圆缓慢横向流动
      flash: 0,         // 闪电全屏闪光强度 1→0
      bolt: null,       // 当前闪电折线(数组)或 null
      boltLife: 0,      // 折线剩余显示帧
      strikeCd: 140,    // 下次落雷倒计时(帧)
    };
    const RAIN_WIND = -2.4; // 雨的水平风偏(负=向左),乘以景深 → 近处偏得更多

    // ── 可选贴图接入(范式 B) ────────────────────────────────────────
    // 默认留空 → 全程程序化;想演示贴图管线时,把资源放到下方路径并解开注释即可。
    // 加载失败(文件不存在)会自动回退程序化,demo 始终可运行。
    const WEATHER_SPRITES = {
      snow: 'assets/weather/snowflake.png',   // Kenney Particle Pack(CC0),已内置;删掉此行即回退程序化雪花
      // rain: 'assets/weather/raindrop.png',  // 备用素材:雨当前走程序化线段,如需贴图雨自行加渲染分支
    };
    const _spriteCache = {};
    function weatherSprite(key) {
      if (!(key in WEATHER_SPRITES)) return null;
      if (key in _spriteCache) return _spriteCache[key];
      const img = new Image();
      img.onerror = () => { _spriteCache[key] = null; }; // 缺资源 → 回退程序化
      img.src = WEATHER_SPRITES[key];
      _spriteCache[key] = img; // 先占位;draw 时以 complete && naturalWidth 判断是否就绪
      return img;
    }
    const spriteReady = (img) => !!img && img.complete && img.naturalWidth > 0;

    // ── 粒子工厂 ──────────────────────────────────────────────────────
    function newRainDrop(W, H) {
      const d = 0.35 + Math.random() * 0.65; // 景深:1=近(长/快/亮),0=远(短/慢/淡)
      return { x: Math.random() * (W + 200) - 100, y: Math.random() * H, d,
               len: 7 + d * 15, spd: 8 + d * 13 };
    }
    function newSnowFlake(W, H) {
      const d = 0.3 + Math.random() * 0.7;
      return { x: Math.random() * W, y: Math.random() * H, d,
               r: 1 + d * 2.6, spd: 0.5 + d * 1.4,
               sway: Math.random() * Math.PI * 2, swaySpd: 0.01 + Math.random() * 0.02,
               spin: Math.random() * Math.PI * 2 };
    }
    function newFogBlob(W, H) {
      return { x: Math.random() * W, y: Math.random() * H * 0.92,
               r: 120 + Math.random() * 220, spd: 0.15 + Math.random() * 0.35,
               a: 0.05 + Math.random() * 0.08 };
    }

    // ── 每帧同步粒子池到「目标数量」(目标随 强度 × 淡入进度 缩放) ────────
    function syncWeather(W, H) {
      const kind = weather.kind, it = weather.intensity || 0;
      if (kind !== fx.kind) {                 // 天气切换:清空旧池,淡入重置
        fx.rain.length = fx.snow.length = fx.fog.length = fx.ripples.length = 0;
        fx.flash = 0; fx.bolt = null; fx.ramp = 0;
        fx.kind = kind;
      }
      fx.ramp = Math.min(1, fx.ramp + 0.02);  // 约 0.8s 淡入完成
      const scale = it * fx.ramp;
      const fit = (pool, target, make) => {
        while (pool.length < target) pool.push(make(W, H));
        if (pool.length > target) pool.length = target;
      };
      if (kind === 'rain')      fit(fx.rain, Math.floor(scale * 340), newRainDrop);
      else if (kind === 'snow') fit(fx.snow, Math.floor(scale * 220), newSnowFlake);
      else if (kind === 'fog')  fit(fx.fog,  5 + Math.floor(scale * 6), newFogBlob);
    }

    // ── 全局天气色调分级(铺在最底层,给整个画面定调) ──────────────────
    function ambientTint(W, H, kind, it) {
      let c = null;
      const k = fx.ramp; // 随淡入渐显,避免切换时色调突变
      if (kind === 'rain')      c = `rgba(18,26,48,${(0.16 + 0.22 * it) * k})`;   // 阴冷偏蓝、压暗
      else if (kind === 'snow') c = `rgba(150,172,210,${(0.05 + 0.10 * it) * k})`; // 清冷偏亮
      else if (kind === 'clear')c = `rgba(255,236,180,0.05)`;                      // 恒定暖阳
      // fog 的色调由 drawFog 自己负责(避免叠加两层灰导致过暗)
      if (!c) return;
      ctx.save(); ctx.fillStyle = c; ctx.fillRect(0, 0, W, H); ctx.restore();
    }

    // ── 雨 ────────────────────────────────────────────────────────────
    function drawRain(W, H, it) {
      ctx.save();
      ctx.lineCap = 'round';
      for (const p of fx.rain) {
        ctx.strokeStyle = `rgba(175,200,232,${(0.18 + 0.42 * p.d) * fx.ramp})`;
        ctx.lineWidth = 0.6 + p.d * 1.1;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + RAIN_WIND * p.d, p.y + p.len);
        ctx.stroke();
        p.y += p.spd; p.x += RAIN_WIND * p.d * 0.25;
        if (p.y > H) {                       // 落地 → 在屏幕随机处激起涟漪
          if (Math.random() < 0.5) spawnRipple(Math.random() * W, Math.random() * H);
          p.y = -p.len; p.x = Math.random() * (W + 200) - 100;
        }
        if (p.x < -100) p.x += W + 200; else if (p.x > W + 100) p.x -= W + 200;
      }
      ctx.restore();
      drawRipples();
      updateLightning(it);
      drawLightning(W, H);
    }

    function spawnRipple(x, y) {
      if (fx.ripples.length > 60) return;    // 上限,防止密度失控
      fx.ripples.push({ x, y, r: 1, max: 5 + Math.random() * 7, life: 1 });
    }
    function drawRipples() {
      ctx.save();
      for (let i = fx.ripples.length - 1; i >= 0; i--) {
        const s = fx.ripples[i];
        s.r += 0.6; s.life -= 0.04;
        if (s.life <= 0) { fx.ripples.splice(i, 1); continue; }
        ctx.strokeStyle = `rgba(190,210,235,${s.life * 0.5})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(s.x, s.y, s.r, s.r * 0.4, 0, 0, Math.PI * 2); // 压扁模拟俯视透视
        ctx.stroke();
      }
      ctx.restore();
    }

    // 闪电:仅在较强降雨(it ≥ 0.55)时随机触发,含全屏闪光 + 可选折线
    function updateLightning(it) {
      if (it < 0.55) { fx.flash = 0; fx.bolt = null; return; }
      if (--fx.strikeCd <= 0) {
        fx.flash = 1;
        fx.strikeCd = 150 + Math.floor(Math.random() * 450); // ~2.5~10s @60fps
        fx.bolt = Math.random() < 0.6 ? makeBolt() : null;
        fx.boltLife = 6;
      }
      fx.flash *= 0.86;                       // 快速衰减
      if (fx.boltLife > 0) fx.boltLife--;
    }
    function makeBolt() {
      let x = Math.random() * canvas.width, y = 0;
      const pts = [{ x, y }];
      while (y < canvas.height * 0.7) {
        y += 20 + Math.random() * 40;
        x += (Math.random() - 0.5) * 60;
        pts.push({ x, y });
      }
      return pts;
    }
    function drawLightning(W, H) {
      if (fx.flash > 0.02) {
        ctx.save();
        ctx.fillStyle = `rgba(220,228,255,${fx.flash * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
      if (fx.bolt && fx.boltLife > 0) {
        ctx.save();
        ctx.strokeStyle = `rgba(235,240,255,${fx.boltLife / 6})`;
        ctx.lineWidth = 2; ctx.shadowColor = '#cdd6ff'; ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.moveTo(fx.bolt[0].x, fx.bolt[0].y);
        for (const pt of fx.bolt) ctx.lineTo(pt.x, pt.y);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ── 雪(程序化 / 贴图 双范式) ───────────────────────────────────────
    function drawSnow(W, H, it) {
      const spr = weatherSprite('snow');
      const useSprite = spriteReady(spr);
      ctx.save();
      if (!useSprite) ctx.fillStyle = 'rgba(255,255,255,0.9)';
      for (const p of fx.snow) {
        p.sway += p.swaySpd;
        p.y += p.spd;
        p.x += Math.sin(p.sway) * 0.6 + 0.15; // 摆动 + 轻微风
        p.spin += 0.01;
        if (p.y > H) { p.y = -4; p.x = Math.random() * W; }
        if (p.x < -5) p.x = W + 5; else if (p.x > W + 5) p.x = -5;
        const alpha = (0.5 + 0.45 * p.d) * fx.ramp;
        if (useSprite) {
          const s = p.r * 3;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(p.x, p.y); ctx.rotate(p.spin);
          ctx.drawImage(spr, -s / 2, -s / 2, s, s);
          ctx.restore();
        } else {
          ctx.globalAlpha = alpha;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.restore();
    }

    // ── 雾:柔光底 + 缓慢横向流动的体积雾团(取代原来的一层平铺半透明) ──────
    function drawFog(W, H, it) {
      ctx.save();
      ctx.fillStyle = `rgba(200,206,218,${0.12 * it * fx.ramp})`;
      ctx.fillRect(0, 0, W, H);
      for (const b of fx.fog) {
        b.x += b.spd;
        if (b.x - b.r > W) b.x = -b.r;        // 飘出右侧 → 从左侧回卷
        const a = b.a * it * fx.ramp;
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        g.addColorStop(0, `rgba(214,218,228,${a})`);
        g.addColorStop(1, 'rgba(214,218,228,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    // ── 天气渲染总入口(屏幕空间,叠在世界与暗角之上) ────────────────────
    function drawWeather(W, H) {
      syncWeather(W, H);
      const kind = weather.kind, it = weather.intensity || 0;
      ambientTint(W, H, kind, it);
      if (kind === 'rain')      drawRain(W, H, it);
      else if (kind === 'snow') drawSnow(W, H, it);
      else if (kind === 'fog')  drawFog(W, H, it);
      // clear:仅 ambientTint 的暖调
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
